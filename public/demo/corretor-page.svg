  <rect x="44" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="44" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>
  <rect x="76" y="432" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="80" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="80" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>
  <rect x="112" y="432" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="116" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="116" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>

  <!-- Card 2 (center - slightly elevated) -->
  <rect x="285" y="268" width="225" height="200" rx="12" fill="white" filter="url(#cardShadowFilter)"/>
  <rect x="285" y="268" width="225" height="110" rx="12" fill="#b0bec5"/>
  <rect x="285" y="346" width="225" height="22" fill="#b0bec5"/>
  <rect x="297" y="280" width="45" height="18" rx="9" fill="#059669"/>
  <rect x="305" y="286" width="29" height="6" rx="3" fill="white" opacity="0.9"/>
  <circle cx="497" cy="289" r="12" fill="white" opacity="0.85"/>
  <rect x="297" y="342" width="95" height="12" rx="6" fill="white"/>
  <rect x="297" y="355" width="70" height="7" rx="3.5" fill="white" opacity="0.7"/>
  <rect x="297" y="384" width="50" height="6" rx="3" fill="#3b82f6"/>
  <rect x="297" y="396" width="180" height="9" rx="4.5" fill="#0f172a"/>
  <rect x="297" y="410" width="140" height="7" rx="3.5" fill="#94a3b8"/>
  <rect x="297" y="424" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="301" y="430" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="301" y="439" width="16" height="4" rx="2" fill="#94a3b8"/>
  <rect x="333" y="424" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="337" y="430" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="337" y="439" width="16" height="4" rx="2" fill="#94a3b8"/>
