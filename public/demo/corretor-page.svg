<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f45"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="cardShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="imgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="cardShadowFilter" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background white -->
  <rect width="800" height="500" fill="#f8fafc" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" fill="white" rx="0"/>
  <rect x="0" y="0" width="800" height="52" fill="white"/>
  <rect x="0" y="51" width="800" height="1" fill="#e2e8f0"/>

  <!-- Logo -->
  <rect x="28" y="16" width="14" height="14" rx="3" fill="#1d4ed8"/>
  <rect x="48" y="19" width="55" height="8" rx="4" fill="#0f172a"/>
  <rect x="48" y="30" width="35" height="5" rx="2.5" fill="#94a3b8"/>

  <!-- Nav links -->
  <rect x="320" y="22" width="40" height="7" rx="3.5" fill="#64748b"/>
  <rect x="376" y="22" width="45" height="7" rx="3.5" fill="#64748b"/>
  <rect x="437" y="22" width="38" height="7" rx="3.5" fill="#64748b"/>
  <rect x="491" y="22" width="42" height="7" rx="3.5" fill="#64748b"/>

  <!-- CTA button -->
  <rect x="700" y="14" width="80" height="28" rx="8" fill="url(#accent)"/>
  <rect x="712" y="22" width="56" height="8" rx="4" fill="white" opacity="0.9"/>

  <!-- Hero Banner -->
  <rect x="0" y="52" width="800" height="170" fill="url(#heroBg)"/>

  <!-- Hero decorative blobs -->
  <circle cx="680" cy="52" r="120" fill="#3b82f6" opacity="0.08"/>
  <circle cx="100" cy="180" r="80" fill="#6366f1" opacity="0.08"/>

  <!-- Avatar circle -->
  <circle cx="100" cy="158" r="50" fill="white" opacity="0.15" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="100" cy="152" r="20" fill="white" opacity="0.4"/>
  <ellipse cx="100" cy="178" rx="28" ry="14" fill="white" opacity="0.3"/>

  <!-- Hero text -->
  <rect x="164" y="82" width="180" height="14" rx="7" fill="white"/>
  <rect x="164" y="102" width="140" height="10" rx="5" fill="white" opacity="0.6"/>
  <rect x="164" y="118" width="200" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="164" y="132" width="160" height="8" rx="4" fill="white" opacity="0.4"/>

  <!-- Hero badge -->
  <rect x="164" y="66" width="80" height="12" rx="6" fill="white" opacity="0.15" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="172" y="70" width="64" height="4" rx="2" fill="white" opacity="0.6"/>

  <!-- Social icons in hero -->
  <circle cx="166" cy="162" r="12" fill="white" opacity="0.15"/>
  <circle cx="192" cy="162" r="12" fill="white" opacity="0.15"/>
  <circle cx="218" cy="162" r="12" fill="white" opacity="0.15"/>
  <circle cx="244" cy="162" r="12" fill="white" opacity="0.15"/>

  <!-- Stats bar -->
  <rect x="450" y="90" width="320" height="120" rx="12" fill="white" opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="466" y="106" width="60" height="10" rx="5" fill="white"/>
  <rect x="466" y="120" width="45" height="7" rx="3.5" fill="white" opacity="0.5"/>
  <rect x="466" y="132" width="55" height="7" rx="3.5" fill="white" opacity="0.5"/>

  <rect x="565" y="98" width="1" height="80" fill="white" opacity="0.2"/>

  <rect x="581" y="106" width="55" height="10" rx="5" fill="white"/>
  <rect x="581" y="120" width="40" height="7" rx="3.5" fill="white" opacity="0.5"/>
  <rect x="581" y="132" width="50" height="7" rx="3.5" fill="white" opacity="0.5"/>

  <rect x="672" y="98" width="1" height="80" fill="white" opacity="0.2"/>

  <rect x="688" y="106" width="50" height="10" rx="5" fill="white"/>
  <rect x="688" y="120" width="45" height="7" rx="3.5" fill="white" opacity="0.5"/>
  <rect x="688" y="132" width="55" height="7" rx="3.5" fill="white" opacity="0.5"/>

  <!-- WhatsApp CTA button -->
  <rect x="466" y="155" width="130" height="36" rx="8" fill="#25d366"/>
  <rect x="492" y="167" width="78" height="8" rx="4" fill="white" opacity="0.9"/>

