  <rect x="373" y="430" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="373" y="439" width="16" height="4" rx="2" fill="#94a3b8"/>

  <!-- Card 3 -->
  <rect x="542" y="276" width="225" height="200" rx="12" fill="white" filter="url(#cardShadowFilter)"/>
  <rect x="542" y="276" width="225" height="110" rx="12" fill="#90a4ae"/>
  <rect x="542" y="354" width="225" height="22" fill="#90a4ae"/>
  <rect x="554" y="288" width="55" height="18" rx="9" fill="#7c3aed"/>
  <rect x="562" y="294" width="39" height="6" rx="3" fill="white" opacity="0.9"/>
  <circle cx="754" cy="297" r="12" fill="white" opacity="0.85"/>
  <rect x="554" y="350" width="85" height="12" rx="6" fill="white"/>
  <rect x="554" y="363" width="60" height="7" rx="3.5" fill="white" opacity="0.7"/>
  <rect x="554" y="392" width="50" height="6" rx="3" fill="#3b82f6"/>
  <rect x="554" y="404" width="165" height="9" rx="4.5" fill="#0f172a"/>
  <rect x="554" y="418" width="125" height="7" rx="3.5" fill="#94a3b8"/>
  <rect x="554" y="432" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="558" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="558" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>
  <rect x="590" y="432" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="594" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="594" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>
  <rect x="626" y="432" width="28" height="28" rx="6" fill="#f8fafc"/>
  <rect x="630" y="438" width="20" height="5" rx="2.5" fill="#64748b"/>
  <rect x="630" y="447" width="16" height="4" rx="2" fill="#94a3b8"/>
