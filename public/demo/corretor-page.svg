  <rect x="567" y="246" width="46" height="7" rx="3.5" fill="white" opacity="0.9"/>
  <rect x="628" y="238" width="55" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="636" y="246" width="39" height="7" rx="3.5" fill="#64748b"/>
  <rect x="690" y="238" width="60" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="698" y="246" width="44" height="7" rx="3.5" fill="#64748b"/>
  <rect x="758" y="238" width="22" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

