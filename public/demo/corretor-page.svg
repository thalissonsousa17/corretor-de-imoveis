  <!-- Card 1 -->
  <rect x="28" y="276" width="225" height="200" rx="12" fill="white" filter="url(#cardShadowFilter)"/>
  <rect x="28" y="276" width="225" height="110" rx="12" fill="url(#imgGrad)"/>
